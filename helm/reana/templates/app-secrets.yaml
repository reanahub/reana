apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  REANA_SECRET_KEY: {{ required "secrets.reana.REANA_SECRET_KEY must be set on first install. Generate one with e.g. `--set secrets.reana.REANA_SECRET_KEY=$(openssl rand -hex 32)`." .Values.secrets.reana.REANA_SECRET_KEY | b64enc }}
