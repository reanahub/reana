apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-cache-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  password: {{ required "secrets.cache.password must be set on first install (e.g. via -f values.yaml or --set secrets.cache.password=...). For existing clusters, read the current value with: kubectl get secret reana-cache-secrets -o jsonpath='{.data.password}' | base64 -d." .Values.secrets.cache.password | b64enc | quote }}
