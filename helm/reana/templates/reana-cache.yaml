---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reana.prefix" . }}-cache
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "reana.prefix" . }}-cache
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "reana.prefix" . }}-cache
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "reana.prefix" . }}-cache
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ include "reana.prefix" . }}-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reana.prefix" . }}-cache
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ if .Values.maintenance.enabled -}} 0 {{- else -}} 1 {{- end }}
  selector:
    matchLabels:
      app: {{ include "reana.prefix" . }}-cache
  template:
    metadata:
      labels:
        app: {{ include "reana.prefix" . }}-cache
      annotations:
        checksum/cache-secrets: {{ include (print $.Template.BasePath "/cache-secrets.yaml") . | sha256sum }}
    spec:
      containers:
      - name: cache
        image: docker.io/library/redis:8.6.3
        env:
          - name: REANA_CACHE_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cache-secrets
                key: user
          - name: REANA_CACHE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cache-secrets
                key: password
        args:
          # Disable the built-in `default` Redis user so only the named user
          # below can authenticate; without this, Redis accepts passwordless
          # connections as `default` (the legacy `--requirepass` is sugar for
          # giving `default` a password, which we no longer use). Each ACL
          # rule must be a separate argv token (Redis rejects space-joined
          # rules as "Spaces not allowed in ACL usernames"), so the YAML
          # list expands to one element per rule.
          - "--user"
          - "default"
          - "off"
          - "--user"
          - "$(REANA_CACHE_USER)"
          - "on"
          - ">$(REANA_CACHE_PASSWORD)"
          - "~*"
          - "&*"
          - "+@all"
        ports:
        - containerPort: 6379
      {{- if .Values.node_label_infrastructure }}
      {{- $full_label := split "=" .Values.node_label_infrastructure }}
      nodeSelector:
        {{ $full_label._0 }}: {{ $full_label._1 }}
      {{- end }}
