apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-message-broker-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  user: {{ required "secrets.message_broker.user must be set on first install (e.g. via -f values.yaml or --set secrets.message_broker.user=...). For existing clusters, read the current value with: kubectl get secret reana-message-broker-secrets -o jsonpath='{.data.user}' | base64 -d." .Values.secrets.message_broker.user | b64enc | quote }}
  password: {{ required "secrets.message_broker.password must be set on first install (e.g. via -f values.yaml or --set secrets.message_broker.password=...). For existing clusters, read the current value with: kubectl get secret reana-message-broker-secrets -o jsonpath='{.data.password}' | base64 -d." .Values.secrets.message_broker.password | b64enc | quote }}
