{{- if .Values.opensearch.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-opensearch-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  REANA_OPENSEARCH_USER: {{ required "secrets.opensearch.user must be set when opensearch.enabled is true (typically `admin`). For existing clusters, read the current value with: kubectl get secret reana-opensearch-secrets -o jsonpath='{.data.REANA_OPENSEARCH_USER}' | base64 -d." .Values.secrets.opensearch.user | b64enc }}
  REANA_OPENSEARCH_PASSWORD: {{ required "secrets.opensearch.password must be set when opensearch.enabled is true. For existing clusters, read the current value with: kubectl get secret reana-opensearch-secrets -o jsonpath='{.data.REANA_OPENSEARCH_PASSWORD}' | base64 -d." .Values.secrets.opensearch.password | b64enc }}
  {{- if not .Values.opensearch.securityConfig.enabled }}
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: {{ required "opensearch.initialAdminPassword must be set when opensearch.enabled is true and opensearch.securityConfig.enabled is false." .Values.opensearch.initialAdminPassword | b64enc }} # dev environment only
  {{- end }}
{{- end }}
