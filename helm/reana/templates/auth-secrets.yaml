{{- if or .Values.keycloak.enabled (and .Values.auth.issuer .Values.auth.bffEnabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-auth-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  REANA_AUTH_WEB_CLIENT_SECRET: {{ required "secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET must be set when BFF authentication or bundled development Keycloak is enabled." .Values.secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET | b64enc | quote }}
{{- end }}
