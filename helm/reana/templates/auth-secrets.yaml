{{- if or .Values.keycloak.enabled .Values.auth.issuer }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-auth-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  REANA_AUTH_WEB_CLIENT_SECRET: {{ required "secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET must be set when browser OIDC auth is enabled. For local development use helm/configurations/values-dev.yaml; for external issuers pass it through private Helm values." .Values.secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET | b64enc | quote }}
  {{- if .Values.secrets.auth.REANA_AUTH_INTROSPECTION_CLIENT_SECRET }}
  REANA_AUTH_INTROSPECTION_CLIENT_SECRET: {{ .Values.secrets.auth.REANA_AUTH_INTROSPECTION_CLIENT_SECRET | b64enc | quote }}
  {{- end }}
{{- end }}
