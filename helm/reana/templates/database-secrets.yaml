apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reana.prefix" . }}-db-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  user: {{ required "secrets.database.user must be set on first install (e.g. via -f values.yaml or --set secrets.database.user=...). For existing clusters, read the current value with: kubectl get secret reana-db-secrets -o jsonpath='{.data.user}' | base64 -d." .Values.secrets.database.user | b64enc }}
  password: {{ required "secrets.database.password must be set on first install (e.g. via -f values.yaml or --set secrets.database.password=...). For existing clusters, read the current value with: kubectl get secret reana-db-secrets -o jsonpath='{.data.password}' | base64 -d." .Values.secrets.database.password | b64enc }}
