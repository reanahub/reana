---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reana.prefix" . }}-server
  namespace: {{ .Release.Namespace }}
spec:
  type: "ClusterIP"
  ports:
  - port: 80
    targetPort: 5000
    name: "http"
    protocol: TCP
  selector:
    app: {{ include "reana.prefix" . }}-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reana.prefix" . }}-server
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ if .Values.maintenance.enabled -}} 0 {{- else -}} 1 {{- end }}
  selector:
    matchLabels:
      app: {{ include "reana.prefix" . }}-server
  template:
    metadata:
      labels:
        app: {{ include "reana.prefix" . }}-server
      annotations:
        checksum/database-config: {{ include (print $.Template.BasePath "/database-config.yaml") . | sha256sum }}
        checksum/database-secrets: {{ include (print $.Template.BasePath "/database-secrets.yaml") . | sha256sum }}
        {{- if or .Values.keycloak.enabled (and .Values.auth.issuer .Values.auth.bffEnabled) }}
        checksum/auth-secrets: {{ include (print $.Template.BasePath "/auth-secrets.yaml") . | sha256sum }}
        {{- end }}
        checksum/gitlab-secrets: {{ include (print $.Template.BasePath "/gitlab-secrets.yaml") . | sha256sum }}
        checksum/app-secrets: {{ include (print $.Template.BasePath "/app-secrets.yaml") . | sha256sum }}
        checksum/cache-secrets: {{ include (print $.Template.BasePath "/cache-secrets.yaml") . | sha256sum }}
        checksum/message-broker-secrets: {{ include (print $.Template.BasePath "/message-broker-secrets.yaml") . | sha256sum }}
        checksum/uwsgi-config: {{ include (print $.Template.BasePath "/uwsgi-config-reana-server.yaml") . | sha256sum }}
        {{- if .Values.notifications.enabled }}
        checksum/mail-notification-secrets: {{ include (print $.Template.BasePath "/mail-notification-secrets.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- with .Values.components.reana_server.hostAliases }}
      hostAliases:
{{ toYaml . | indent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reana.prefixed_infrastructure_svaccount_name" . }}
      {{- if ne (.Values.shared_storage.fs_group | toString) "" }}
      securityContext:
        fsGroup: {{ .Values.shared_storage.fs_group | int64 }}
        {{- if ne (.Values.shared_storage.fs_group_change_policy | toString) "" }}
        fsGroupChangePolicy: {{ .Values.shared_storage.fs_group_change_policy | quote }}
        {{- end }}
      {{- end }}
      containers:
      - name: rest-api
        image: {{ .Values.components.reana_server.image }}
        imagePullPolicy: {{ .Values.components.reana_server.imagePullPolicy }}
        ports:
        - containerPort: 5000
          name: http
        {{- if .Values.debug.enabled }}
        command: ["flask", "run", "-h", "0.0.0.0", "-p", "5000"]
        tty: true
        stdin: true
        {{- else }}
        # do not use "/bin/sh -c" here as that breaks signal propagation
        command: ["uwsgi", "--ini", "/var/reana/uwsgi/uwsgi.ini"]
        {{- end }}
        resources:
          {{- with .Values.components.reana_server.rest_api.resources }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        volumeMounts:
          {{- if .Values.debug.enabled }}
          - mountPath: /code/
            name: reana-code
          {{- end }}
          - mountPath: {{ .Values.shared_storage.shared_volume_mount_path }}
            name: reana-shared-volume
          {{- range $workspace_paths := .Values.workspaces.paths }}
          {{- if ne (typeOf $workspace_paths) "string" -}}
          {{- fail "The workspaces.paths should be a list of strings e.g node_host_path:pod_mount_path" -}}
          {{- end }}
          {{- $workspace_path := split ":" $workspace_paths }}
          {{- if and (ne $workspace_path._0 $.Values.shared_storage.hostpath.root_path) (ne $workspace_path._1 $.Values.shared_storage.shared_volume_mount_path) }}
          - name: {{ $workspace_path._0 | quote | replace "/" "" }}
            mountPath: {{ $workspace_path._1 }}
          {{- end }}
          {{- end }}
          - name: uwsgi-config-reana-server
            mountPath: '/var/reana/uwsgi'
          - name: reana-config
            mountPath: '/var/reana/config'
        envFrom:
          - configMapRef:
              name: {{ include "reana.prefix" . }}-database-config
        env:
          - name: REANA_COMPONENT_PREFIX
            value: {{ include "reana.prefix" . }}
          - name: REANA_COMPUTE_BACKENDS
            value: {{ .Values.compute_backends | toJson | quote }}
          - name: REANA_INFRASTRUCTURE_KUBERNETES_NAMESPACE
            value: {{ .Release.Namespace | quote }}
          - name: REANA_RUNTIME_KUBERNETES_NAMESPACE
            value: {{ .Values.namespace_runtime | default .Release.Namespace | quote }}
          - name: REANA_DEFAULT_QUOTA_CPU_LIMIT
            value: {{ .Values.quota.default_cpu_limit | default 0 | int64 | quote }}
          - name: REANA_DEFAULT_QUOTA_DISK_LIMIT
            value: {{ .Values.quota.default_disk_limit | default 0 | int64 | quote }}
          - name: REANA_DEFAULT_QUOTA_CPU_PERIOD_RESET_MONTHS
            value: {{ .Values.quota.cpu_period_reset_months | default 0 | int64 | quote }}
          {{- if .Values.kubernetes_jobs_max_user_cpu_request }}
          - name: REANA_KUBERNETES_JOBS_MAX_USER_CPU_REQUEST
            value: {{ .Values.kubernetes_jobs_max_user_cpu_request | quote }}
          {{- end }}
          {{- if .Values.kubernetes_jobs_max_user_cpu_limit }}
          - name: REANA_KUBERNETES_JOBS_MAX_USER_CPU_LIMIT
            value: {{ .Values.kubernetes_jobs_max_user_cpu_limit | quote }}
          {{- end }}
          {{- if .Values.kubernetes_jobs_max_user_memory_request }}
          - name: REANA_KUBERNETES_JOBS_MAX_USER_MEMORY_REQUEST
            value: {{ .Values.kubernetes_jobs_max_user_memory_request | quote }}
          {{- end }}
          {{- if .Values.kubernetes_jobs_max_user_memory_limit }}
          - name: REANA_KUBERNETES_JOBS_MAX_USER_MEMORY_LIMIT
            value: {{ .Values.kubernetes_jobs_max_user_memory_limit | quote }}
          {{- end }}
          - name: REANA_KUBERNETES_JOBS_MAX_USER_TIMEOUT_LIMIT
            value: {{ .Values.kubernetes_jobs_max_user_timeout_limit | default 1209600 | int64 | quote }}  # 1209600 seconds = 14 days
          - name: REANA_INTERACTIVE_SESSION_MAX_INACTIVITY_PERIOD
            value: {{ .Values.interactive_sessions.maximum_inactivity_period | default "forever" | quote }}
          - name: REANA_INTERACTIVE_SESSIONS_ENVIRONMENTS
            value: {{ .Values.interactive_sessions.environments | toJson | quote }}
          - name: REANA_VETTED_CONTAINER_IMAGES
            value: {{ .Values.vetted_container_images | toJson | quote }}
          - name: REANA_KUBERNETES_JOBS_TIMEOUT_LIMIT
            value: {{ .Values.kubernetes_jobs_timeout_limit | default 604800 | int64 | quote }}  # 604800 seconds = 7 days
          - name: REANA_KUBERNETES_JOBS_MIN_USER_UID
            value: {{ .Values.kubernetes_jobs_min_user_uid | default 100 | int64 | quote }}
          {{- if .Values.kubernetes_jobs_cpu_request }}
          - name: REANA_KUBERNETES_JOBS_CPU_REQUEST
            value: {{ .Values.kubernetes_jobs_cpu_request | quote }}
          {{- end }}
          {{- if .Values.kubernetes_jobs_cpu_limit }}
          - name: REANA_KUBERNETES_JOBS_CPU_LIMIT
            value: {{ .Values.kubernetes_jobs_cpu_limit | quote }}
          {{- end }}
          {{- if .Values.kubernetes_jobs_memory_request }}
          - name: REANA_KUBERNETES_JOBS_MEMORY_REQUEST
            value: {{ .Values.kubernetes_jobs_memory_request | quote }}
          {{- end }}
          - name: REANA_KUBERNETES_JOBS_MEMORY_LIMIT
            value: {{ .Values.kubernetes_jobs_memory_limit | default "4Gi" | quote }}
          - name: DASK_ENABLED
            value: {{ .Values.dask.enabled | quote }}
          {{- if .Values.dask.enabled }}
          - name: DASK_AUTOSCALER_ENABLED
            value: {{ .Values.dask.autoscaler_enabled | quote | default "true" }}
          - name: REANA_DASK_CLUSTER_MAX_MEMORY_LIMIT
            value: {{ .Values.dask.cluster_max_memory_limit | default "16Gi" | quote }}
          - name: REANA_DASK_CLUSTER_DEFAULT_NUMBER_OF_WORKERS
            value: {{ .Values.dask.cluster_default_number_of_workers | default "2" | quote }}
          - name: REANA_DASK_CLUSTER_MAX_NUMBER_OF_WORKERS
            value: {{ .Values.dask.cluster_max_number_of_workers | default "20" | quote }}
          - name: REANA_DASK_CLUSTER_DEFAULT_SINGLE_WORKER_MEMORY
            value: {{ .Values.dask.cluster_default_single_worker_memory | default "2Gi" | quote }}
          - name: REANA_DASK_CLUSTER_MAX_SINGLE_WORKER_MEMORY
            value: {{ .Values.dask.cluster_max_single_worker_memory | default "8Gi" | quote }}
          - name: REANA_DASK_CLUSTER_DEFAULT_SINGLE_WORKER_THREADS
            value: {{ .Values.dask.cluster_default_single_worker_threads | default "4" | quote }}
          - name: REANA_DASK_CLUSTER_MAX_SINGLE_WORKER_THREADS
            value: {{ .Values.dask.cluster_max_single_worker_threads | default "8" | quote }}
          {{- end }}
          - name: WORKSPACE_PATHS
            value: {{ .Values.workspaces.paths | toJson | quote }}
          - name: WORKSPACE_RETENTION_PERIOD
            value: {{ .Values.workspaces.retention_rules.maximum_period | default "forever" | quote }}
          {{- if .Values.quota.enabled }}
          - name: REANA_WORKFLOW_TERMINATION_QUOTA_UPDATE_POLICY
            value: {{ tpl .Values.quota.workflow_termination_update_policy . | quote }}
          {{- end }}
          {{- range $key, $value := .Values.components.reana_server.environment }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          {{- if .Values.reana_hostname }}
          - name: REANA_HOSTNAME
            value: {{ .Values.reana_hostname | quote }}
          {{- end }}
          {{- if or .Values.keycloak.enabled .Values.auth.issuer }}
          {{- if .Values.keycloak.enabled }}
          # OIDC/JWT authentication against the bundled Keycloak. The issuer is
          # browser-facing; discovery is fetched in-cluster via the Keycloak
          # Service (backchannel), see reana-keycloak.yaml.
          - name: REANA_AUTH_ISSUER
            value: "{{ .Values.keycloak.frontend_url }}/realms/{{ .Values.keycloak.realm }}"
          - name: REANA_AUTH_OPENID_CONFIG_URL
            value: "http://{{ include "reana.prefix" . }}-keycloak:8080{{ .Values.keycloak.relative_path }}/realms/{{ .Values.keycloak.realm }}/.well-known/openid-configuration"
          - name: REANA_AUTH_AUDIENCE
            value: {{ .Values.keycloak.audience | default "reana" | quote }}
          - name: REANA_AUTH_ROLES_CLAIM
            value: {{ .Values.keycloak.roles_claim | default "reana_roles" | quote }}
          - name: REANA_AUTH_REQUIRED_ROLE
            value: {{ .Values.keycloak.required_role | default "reana:user" | quote }}
          - name: REANA_AUTH_CLIENT_ID
            value: {{ .Values.keycloak.cli_client_id | default "reana-cli" | quote }}
          - name: REANA_AUTH_WEB_CLIENT_ID
            value: {{ .Values.keycloak.web_client_id | default "reana-server" | quote }}
          - name: REANA_AUTH_BFF_ENABLED
            value: "true"
          {{- else }}
          # OIDC/JWT authentication against an external issuer.
          - name: REANA_AUTH_ISSUER
            value: {{ required "auth.issuer must be set when keycloak.enabled=false" .Values.auth.issuer | quote }}
          {{- if .Values.auth.openidConfigUrl }}
          - name: REANA_AUTH_OPENID_CONFIG_URL
            value: {{ .Values.auth.openidConfigUrl | quote }}
          {{- end }}
          {{- if .Values.auth.jwksUrl }}
          - name: REANA_AUTH_JWKS_URL
            value: {{ .Values.auth.jwksUrl | quote }}
          {{- end }}
          {{- if .Values.auth.userinfoUrl }}
          - name: REANA_AUTH_USERINFO_URL
            value: {{ .Values.auth.userinfoUrl | quote }}
          {{- end }}
          {{- if .Values.auth.authorizationUrl }}
          - name: REANA_AUTH_AUTHORIZATION_URL
            value: {{ .Values.auth.authorizationUrl | quote }}
          {{- end }}
          {{- if .Values.auth.tokenUrl }}
          - name: REANA_AUTH_TOKEN_URL
            value: {{ .Values.auth.tokenUrl | quote }}
          {{- end }}
          {{- if .Values.auth.endSessionUrl }}
          - name: REANA_AUTH_END_SESSION_URL
            value: {{ .Values.auth.endSessionUrl | quote }}
          {{- end }}
          {{- if .Values.auth.deviceAuthorizationUrl }}
          - name: REANA_AUTH_DEVICE_AUTHORIZATION_URL
            value: {{ .Values.auth.deviceAuthorizationUrl | quote }}
          {{- end }}
          - name: REANA_AUTH_AUDIENCE
            value: {{ .Values.auth.audience | quote }}
          - name: REANA_AUTH_ROLES_CLAIM
            value: {{ .Values.auth.rolesClaim | quote }}
          - name: REANA_AUTH_REQUIRED_ROLE
            value: {{ .Values.auth.requiredRole | quote }}
          - name: REANA_AUTH_CLIENT_ID
            value: {{ .Values.auth.clientId | quote }}
          - name: REANA_AUTH_WEB_CLIENT_ID
            value: {{ .Values.auth.webClientId | quote }}
          - name: REANA_AUTH_BFF_ENABLED
            value: {{ .Values.auth.bffEnabled | quote }}
          - name: REANA_AUTH_SCOPES
            value: {{ .Values.auth.scopes | quote }}
          - name: REANA_AUTH_SESSION_TTL
            value: {{ .Values.auth.sessionTtl | quote }}
          {{- end }}
          {{- if or .Values.keycloak.enabled .Values.auth.bffEnabled }}
          - name: REANA_AUTH_WEB_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-auth-secrets
                key: REANA_AUTH_WEB_CLIENT_SECRET
          {{- end }}
          {{- end }}
          {{- if .Values.secrets.gitlab }}
          - name: REANA_GITLAB_OAUTH_APP_ID
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cern-gitlab-secrets
                key: REANA_GITLAB_OAUTH_APP_ID
          - name: REANA_GITLAB_OAUTH_APP_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cern-gitlab-secrets
                key: REANA_GITLAB_OAUTH_APP_SECRET
          - name: REANA_GITLAB_HOST
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cern-gitlab-secrets
                key: REANA_GITLAB_HOST
          {{- end }}
          - name: REANA_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-secrets
                key: REANA_SECRET_KEY
          - name: REANA_CACHE_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cache-secrets
                key: user
          - name: REANA_CACHE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-cache-secrets
                key: password
          - name: RABBIT_MQ_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-message-broker-secrets
                key: user
          - name: RABBIT_MQ_PASS
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-message-broker-secrets
                key: password
          {{- if .Values.debug.enabled }}
          - name: PYTHONPATH
            value: "/code/reana-server:/code/modules/reana-commons:/code/modules/reana-db"
          - name: WDB_SOCKET_SERVER
            value: "{{ include "reana.prefix" . }}-wdb"
          - name: WDB_NO_BROWSER_AUTO_OPEN
            value: "True"
          - name: FLASK_DEBUG
            value:  "1"
          # Hack to not verify SSL connections https://stackoverflow.com/questions/48391750/disable-python-requests-ssl-validation-for-an-imported-module
          - name: CURL_CA_BUNDLE
            value: ""
          - name: GIT_SSL_NO_VERIFY
            value: "true"
          {{- end }}
          - name: REANA_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-db-secrets
                key: user
          - name: REANA_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-db-secrets
                key: password
          - name: REANA_NOTIFICATIONS_ENABLED
            value: {{ .Values.notifications.enabled | quote }}
          {{- if .Values.notifications.enabled }}
          - name: REANA_EMAIL_RECEIVER
            value: {{ .Values.notifications.email_config.receiver | quote }}
          - name: REANA_EMAIL_SENDER
            value: {{ .Values.notifications.email_config.sender | quote }}
          - name: REANA_EMAIL_SMTP_SERVER
            value: {{ .Values.notifications.email_config.smtp_server | default (printf "%s-mail" (include "reana.prefix" .)) | quote }}
          - name: REANA_EMAIL_SMTP_PORT
            value: {{ .Values.notifications.email_config.smtp_port | default "30025" | quote }}
          - name: REANA_EMAIL_SMTP_SSL
            value: {{ .Values.notifications.email_config.smtp_ssl | quote }}
          {{- if .Values.debug.enabled }}
          - name: REANA_EMAIL_SMTP_STARTTLS
            value: "false"
          {{- else }}
          - name: REANA_EMAIL_SMTP_STARTTLS
            value: {{ .Values.notifications.email_config.smtp_starttls | quote }}
          - name: REANA_EMAIL_LOGIN
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-mail-notification-sender-password
                key: REANA_EMAIL_LOGIN
          - name: REANA_EMAIL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "reana.prefix" . }}-mail-notification-sender-password
                key: REANA_EMAIL_PASSWORD
          {{- end }}
          {{- end }}
      - name: scheduler
        image: {{ .Values.components.reana_server.image }}
        imagePullPolicy: {{ .Values.components.reana_server.imagePullPolicy }}
        command: ["flask", "start-scheduler"]
        resources:
          {{- with .Values.components.reana_server.scheduler.resources }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        volumeMounts:
          {{- if .Values.debug.enabled }}
          - mountPath: /code/
            name: reana-code
          {{- end }}
          - mountPath: {{ .Values.shared_storage.shared_volume_mount_path }}
            name: reana-shared-volume
        envFrom:
          - configMapRef:
              name: {{ include "reana.prefix" . }}-database-config
        env:
        - name: REANA_COMPONENT_PREFIX
          value: {{ include "reana.prefix" . }}
        - name: REANA_INFRASTRUCTURE_KUBERNETES_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: REANA_RUNTIME_KUBERNETES_NAMESPACE
          value: {{ .Values.namespace_runtime | default .Release.Namespace | quote }}
        {{- range $key, $value := .Values.components.reana_server.environment }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if .Values.debug.enabled }}
        - name: PYTHONPATH
          value: "/code/reana-server:/code/modules/reana-commons:/code/modules/reana-db"
        - name: WDB_SOCKET_SERVER
          value: "{{ include "reana.prefix" . }}-wdb"
        - name: WDB_NO_BROWSER_AUTO_OPEN
          value: "True"
        - name: FLASK_DEBUG
          value:  "1"
        # Hack to not verify SSL connections https://stackoverflow.com/questions/48391750/disable-python-requests-ssl-validation-for-an-imported-module
        - name: CURL_CA_BUNDLE
          value: ""
        - name: GIT_SSL_NO_VERIFY
          value: "true"
        {{- end }}
        - name: REANA_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "reana.prefix" . }}-db-secrets
              key: user
        - name: REANA_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "reana.prefix" . }}-db-secrets
              key: password
        - name: RABBIT_MQ_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "reana.prefix" . }}-message-broker-secrets
              key: user
        - name: RABBIT_MQ_PASS
          valueFrom:
            secretKeyRef:
              name: {{ include "reana.prefix" . }}-message-broker-secrets
              key: password
      volumes:
      - name: reana-shared-volume
        {{- if not (eq .Values.shared_storage.backend "hostpath") }}
        persistentVolumeClaim:
          claimName: {{ include "reana.prefix" . }}-shared-persistent-volume
          readOnly: false
        {{- else }}
        hostPath:
          path:  {{ .Values.shared_storage.hostpath.root_path }}
        {{- end }}
      {{- if .Values.debug.enabled }}
      - name: reana-code
        hostPath:
          path: /code/reana-server
      {{- end }}
      - name: uwsgi-config-reana-server
        configMap:
          defaultMode: 420
          name: uwsgi-config-reana-server
      - name: reana-config
        configMap:
          defaultMode: 420
          name: reana-config
      {{- if .Values.node_label_infrastructure }}
      {{- $full_label := split "=" .Values.node_label_infrastructure }}
      nodeSelector:
        {{ $full_label._0 }}: {{ $full_label._1 }}
      {{- end }}
      {{- range $workspace_paths := .Values.workspaces.paths }}
      {{- $workspace_path := split ":" $workspace_paths }}
      {{- if and (ne $workspace_path._0 $.Values.shared_storage.hostpath.root_path) (ne $workspace_path._1 $.Values.shared_storage.shared_volume_mount_path) }}
      - name: {{ $workspace_path._0 | quote | replace "/" "" }}
        hostPath:
          path: {{ $workspace_path._0 }}
      {{- end }}
      {{- end }}
