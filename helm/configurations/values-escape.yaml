# REANA authentication profile for a local ESCAPE/INDIGO IAM instance.
#
# The profile matches the seed output from a development IAM at:
#   https://iam.local
#
# Use with:
#   reana-dev cluster-deploy --mode debug \
#     --admin-email you@example.org \
#     --admin-password admin \
#     -f helm/configurations/values-dev.yaml \
#     -f helm/configurations/values-escape.yaml \
#     --set auth.clientId=<seeded-reana-client-id> \
#     --set auth.webClientId=<seeded-reana-client-id> \
#     --set secrets.auth.REANA_AUTH_WEB_CLIENT_SECRET=<seeded-reana-client-secret>
#
# Use the client ID and secret printed by `make seed` in escape-iam-local. Its
# single REANA client supports both browser authorization-code and CLI
# device-code flows, hence the same generated ID is used for both client IDs.
#
# If iam.local runs on the host rather than inside the Kubernetes cluster, pass
# a host alias override that points to the host-reachable address, for example:
#   --set components.reana_server.hostAliases[0].ip=<host-gateway-ip> \
#   --set components.reana_server.hostAliases[0].hostnames[0]=iam.local

components:
  reana_server:
    hostAliases:
      - ip: "172.17.0.1"
        hostnames:
          - "iam.local"

keycloak:
  enabled: false

auth:
  # Match the JWT `iss` claim exactly; the local IAM tokens omit the trailing
  # slash.
  issuer: "https://iam.local"
  openidConfigUrl: ""
  clientId: ""
  webClientId: ""
  bffEnabled: true
  scopes: "openid profile email offline_access"
  rolesClaim: reana_roles
  requiredRole: "reana:user"

secrets:
  auth:
    REANA_AUTH_WEB_CLIENT_SECRET: ""
