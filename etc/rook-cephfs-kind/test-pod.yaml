apiVersion: v1
kind: Pod
metadata:
  name: rook-cephfs-smoke
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: smoke
      image: docker.io/library/busybox:1.36
      command:
        - sh
        - -c
        - |
          set -e
          echo first > /mnt/reanafs/probe.txt
          cat /mnt/reanafs/probe.txt
      volumeMounts:
        - name: reanafs
          mountPath: /mnt/reanafs
  volumes:
    - name: reanafs
      persistentVolumeClaim:
        claimName: rook-cephfs-smoke
